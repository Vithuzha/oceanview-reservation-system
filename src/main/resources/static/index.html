<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ocean View Resort - Online Room Reservation System. Secure login for staff and management.">
    <title>Ocean View Resort | Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="login">

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="icon">🏖️</span>
                <h1>Ocean View Resort</h1>
                <p>Room Reservation System — Galle, Sri Lanka</p>
            </div>

            <div id="loginError" class="alert alert-error" style="display:none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control"
                           placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control"
                           placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    🔐 Sign In
                </button>
            </form>

            <div style="text-align:center; margin-top:24px; color:var(--text-muted); font-size:12px;">
                <p>Default Credentials for Testing:</p>
                <p style="margin-top:4px;">Staff: <strong>staff</strong> / <strong>password123</strong></p>
                <p>Manager: <strong>manager</strong> / <strong>admin123</strong></p>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
