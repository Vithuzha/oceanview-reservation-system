<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate Bill | Ocean View Resort</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body data-page="billing">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="icon">🏖️</span>
                <h2>Ocean View Resort</h2>
                <p>Reservation System</p>
            </div>
            <nav class="sidebar-nav">
                <a href="/pages/dashboard.html" class="nav-item" data-page="dashboard"><span class="nav-icon">📊</span>
                    Dashboard</a>
                <a href="/pages/add-reservation.html" class="nav-item" data-page="add-reservation"><span
                        class="nav-icon">➕</span> Add Reservation</a>
                <a href="/pages/view-reservation.html" class="nav-item" data-page="view-reservation"><span
                        class="nav-icon">🔍</span> View Reservations</a>
                <a href="/pages/billing.html" class="nav-item" data-page="billing"><span class="nav-icon">💰</span>
                    Calculate Bill</a>
                <a href="/pages/reports.html" class="nav-item" data-page="reports"><span class="nav-icon">📈</span>
                    Reports</a>
                <a href="/pages/help.html" class="nav-item" data-page="help"><span class="nav-icon">❓</span> Help</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">S</div>
                    <div class="user-details">
                        <div class="name" id="userName">Staff</div>
                        <div class="role" id="userRole">STAFF</div>
                    </div>
                </div>
                <a class="nav-item" onclick="logout()" style="cursor:pointer;"><span class="nav-icon">🚪</span>
                    Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Calculate & Print Bill</h1>
                <p>Generate and print invoices for guest reservations</p>
            </div>

            <!-- Bill Form -->
            <div class="card" style="max-width: 600px; margin-bottom: 24px;">
                <div class="card-title">💳 Enter Reservation ID</div>
                <form id="billForm" style="display:flex; gap:12px;">
                    <input type="text" id="billResId" class="form-control" placeholder="e.g., RES-20260303-0001"
                        required>
                    <button type="submit" class="btn btn-primary">Generate Bill</button>
                </form>
            </div>

            <!-- Bill Result -->
            <div id="billResult"></div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
