# ============================================
# Ocean View Resort - Application Configuration
# ============================================

# Application Name
spring.application.name=Ocean View Resort Reservation System

# Server Port
server.port=8080

# ============================================
# H2 Database Configuration (Development)
# ============================================
spring.datasource.url=jdbc:h2:mem:oceanviewdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# MySQL Configuration (Production - uncomment to use)
# ============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/oceanview_resort?useSSL=false&serverTimezone=Asia/Colombo
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# Logging Configuration
# ============================================
logging.level.com.oceanview.resort=INFO
logging.level.org.springframework.security=WARN
